<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OBH Check-In Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --obh-blue: #1B4F9C;
    --obh-blue-dark: #123a73;
    --obh-orange: #F5A623;
    --green: #1f9d55;
    --red: #d64545;
    --bg: #f4f6fa;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- HEADER ---------- */
  header {
    background: var(--obh-blue);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  header img { height: 36px; display: block; }
  .header-logos { display: flex; align-items: center; gap: 10px; }
  .day-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.12);
    padding: 6px 10px;
    border-radius: 20px;
  }
  .day-toggle label { color: #fff; font-size: 12px; font-weight: 600; }
  .day-toggle select {
    border: none;
    border-radius: 12px;
    padding: 4px 8px;
    font-size: 13px;
    font-weight: 600;
    background: #fff;
    color: var(--obh-blue-dark);
  }
  .outside-dates-banner {
    background: var(--obh-orange);
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    padding: 6px 10px;
    display: none;
  }
  .outside-dates-banner.show { display: block; }

  /* ---------- MAIN AREA ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 16px;
    gap: 14px;
  }

  #scanner-wrap {
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    overflow: hidden;
    border: 3px solid var(--obh-blue);
    background: #000;
    position: relative;
  }
  #reader { width: 100%; }
  #reader video { width: 100% !important; border-radius: 13px; }

  .scan-hint {
    font-size: 14px;
    color: #555;
    text-align: center;
    max-width: 360px;
  }

  /* ---------- RESULT OVERLAY ---------- */
  #result-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    z-index: 50;
  }
  #result-overlay.show { display: flex; }
  #result-overlay .icon { font-size: 72px; line-height: 1; margin-bottom: 10px; }
  #result-overlay .status-text {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  #result-overlay .person-name {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  #result-overlay .sub-text {
    font-size: 16px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 26px;
  }
  #result-overlay button {
    background: #fff;
    border: none;
    border-radius: 30px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    cursor: pointer;
  }

  .bg-checked-in { background: var(--green); }
  .bg-already { background: var(--obh-orange); }
  .bg-notfound { background: var(--red); }
  .bg-error { background: #555; }

  /* ---------- LOADING ---------- */
  #processing-banner {
    display: none;
    font-size: 14px;
    font-weight: 700;
    color: var(--obh-blue-dark);
    background: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  #processing-banner.show { display: block; }
</style>
</head>
<body>

  <header>
    <div class="header-logos">
      <img src="https://raw.githubusercontent.com/Nneka24/OBH/refs/heads/main/OBH%20X%20BC.png" alt="OBH">
      <img src="https://raw.githubusercontent.com/Nneka24/OBH/refs/heads/main/redefine.png" alt="Redefine Onitsha">
    </div>
    <div class="day-toggle">
      <label for="daySelect">Day:</label>
      <select id="daySelect">
        <option value="1">Day 1 — Sat 4th</option>
        <option value="2">Day 2 — Sun 5th</option>
      </select>
    </div>
  </header>

  <div class="outside-dates-banner" id="outsideDatesBanner">⚠️ Today is outside event dates — using manual day selection above</div>

  <main>
    <div id="processing-banner">Looking up ticket…</div>
    <div id="scanner-wrap">
      <div id="reader"></div>
    </div>
    <p class="scan-hint">Point the camera at the QR code on the attendee's ticket. Scanning is continuous — no button needed.</p>
  </main>

  <div id="result-overlay">
    <div class="icon" id="result-icon"></div>
    <div class="status-text" id="result-status"></div>
    <div class="person-name" id="result-name"></div>
    <div class="sub-text" id="result-sub"></div>
    <button id="result-dismiss">Scan Next</button>
  </div>

  <script>
    // ============================================================
    // CONFIG — update this URL if the Apps Script deployment is ever redeployed
    // (redeploying as a NEW deployment changes the /exec URL; updating an
    // EXISTING deployment via "Manage deployments" keeps the same URL).
    // ============================================================
    var API_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

    // ---------- DAY AUTO-DETECTION (client-side, since this page has no server clock to call) ----------
    var EVENT_DAY1 = '2026-07-04';
    var EVENT_DAY2 = '2026-07-05';

    function detectTodayAsEventDay() {
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, '0');
      var d = String(now.getDate()).padStart(2, '0');
      var todayStr = y + '-' + m + '-' + d;
      if (todayStr === EVENT_DAY1) return 1;
      if (todayStr === EVENT_DAY2) return 2;
      return 0;
    }

    var detectedDay = detectTodayAsEventDay();
    var daySelect = document.getElementById('daySelect');
    daySelect.value = (detectedDay === 2) ? '2' : '1';
    if (detectedDay === 0) {
      document.getElementById('outsideDatesBanner').classList.add('show');
    }

    // ---------- SCANNER ----------
    var html5QrCode = new Html5Qrcode("reader");
    var isProcessing = false; // lock to prevent double-fires on the same scan

    function startScanner() {
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess,
        function onScanFailure(err) { /* fires continuously while no QR is in frame — ignore */ }
      ).catch(function (err) {
        document.getElementById('reader').innerHTML =
          '<p style="color:#fff;padding:20px;text-align:center;">Camera access failed. Please allow camera permission and reload this page.<br><br>(' + err + ')</p>';
      });
    }

    function onScanSuccess(decodedText) {
      if (isProcessing) return; // ignore rapid repeat reads of the same code
      isProcessing = true;
      document.getElementById('processing-banner').classList.add('show');

      var day = parseInt(daySelect.value, 10);
      submitScan(decodedText, day);
    }

    // ---------- API CALL ----------
    // CRITICAL: Content-Type must stay 'text/plain' here, NOT 'application/json'.
    // Apps Script's doPost cannot respond to a CORS preflight (OPTIONS request) at all.
    // 'application/json' is NOT a CORS-simple content-type, so the browser would send
    // a preflight first, Apps Script would never answer it, and the real POST would
    // never fire — silently, with no useful console error. 'text/plain' is CORS-simple,
    // so the browser skips the preflight and sends the POST directly. Apps Script's
    // doPost still reads e.postData.contents and JSON.parses it correctly regardless
    // of what content-type label we send it under.
    function submitScan(qrText, day) {
      fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ qrText: qrText, day: day })
      })
        .then(function (res) { return res.json(); })
        .then(function (result) {
          document.getElementById('processing-banner').classList.remove('show');
          showResult(result);
        })
        .catch(function (err) {
          document.getElementById('processing-banner').classList.remove('show');
          showResult({ status: 'ERROR', message: String(err) });
        });
    }

    function showResult(result) {
      var overlay = document.getElementById('result-overlay');
      var icon = document.getElementById('result-icon');
      var status = document.getElementById('result-status');
      var name = document.getElementById('result-name');
      var sub = document.getElementById('result-sub');

      overlay.className = ''; // reset bg classes

      if (result.status === 'CHECKED_IN') {
        overlay.classList.add('bg-checked-in');
        icon.textContent = '✅';
        status.textContent = 'CHECKED IN';
        name.textContent = result.name;
        sub.textContent = 'Ticket ' + result.ticketId + ' — give tag for Day ' + daySelect.value;
      } else if (result.status === 'ALREADY_CHECKED_IN') {
        overlay.classList.add('bg-already');
        icon.textContent = '⚠️';
        status.textContent = 'ALREADY CHECKED IN';
        name.textContent = result.name;
        sub.textContent = 'Checked in at ' + result.time + ' — check for tag before allowing entry';
      } else if (result.status === 'NOT_FOUND') {
        overlay.classList.add('bg-notfound');
        icon.textContent = '❌';
        status.textContent = 'TICKET NOT FOUND';
        name.textContent = '';
        sub.textContent = result.message || 'This QR code does not match any registration.';
      } else {
        overlay.classList.add('bg-error');
        icon.textContent = '⚠️';
        status.textContent = 'ERROR';
        name.textContent = '';
        sub.textContent = result.message || 'Something went wrong — try again.';
      }

      overlay.classList.add('show');
    }

    document.getElementById('result-dismiss').addEventListener('click', function () {
      document.getElementById('result-overlay').classList.remove('show');
      isProcessing = false;
    });

    startScanner();
  </script>

</body>
</html>
